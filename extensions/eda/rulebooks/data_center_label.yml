---
- name: Test run job templates with labels
  hosts: all
  execution_strategy: parallel
  sources:
    - ansible.eda.generic:
        payload:
           - name: DataCenter 1
             error: 678
             sleep: 30
           - name: DataCenter 2
             error: 303
             sleep: 20
           - name: DataCenter 3
             error: 353
             sleep: 10
        shutdown_after: 60
        create_index: index
  rules:
    - name: "Run job template"
      condition: event.error >= 303
      action:
        run_job_template:
          name: Demo Job Template
          organization: Default
          job_args:
            extra_vars:
              hello: Fred
          retries: 1
          labels: 
            - "{{ event.name }}"
          delay: 10
          set_facts: True
