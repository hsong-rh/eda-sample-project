---
- name: Test run job templates with lock
  hosts: all
  execution_strategy: parallel
  sources:
    - ansible.eda.generic:
        payload:
           - name: DataCenter1
             error: 678
             sleep: 30
           - name: DataCenter2
             error: 303
             sleep: 20
           - name: DataCenter3
             error: 353
             sleep: 10
        loop_count: 3   
        shutdown_after: 60
        create_index: index
  rules:
    - name: "Run job template"
      condition: event.error >= 303
      action:
        run_job_template:
          name: Fix My Datacenter
          organization: Default
          job_args:
            extra_vars:
              hello: Fred
              sleep: "{{ event.sleep }}"
          retries: 1
          lock: "{{ event.name }}"
          delay: 10
          set_facts: True
